name: Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:


jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - run: pip install -e ".[dev]"
    - run: ruff check .
    - run: ruff format --check .
    - run: mypy .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint
    env:
      SSH_OPTS: -o StrictHostKeyChecking=yes
      REMOTE: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
    - uses: actions/checkout@v4

    - uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Configure known hosts
      run: |
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        printf "%s\n" "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
        chmod 600 ~/.ssh/known_hosts

    - name: Sync project to server
      run: |
        rsync -az --delete \
          --exclude=.git/ \
          --exclude=.env \
          --exclude=__pycache__/ \
          --exclude='*.pyc' \
          --exclude=.mypy_cache/ \
          --exclude=.ruff_cache/ \
          -e "ssh $SSH_OPTS" \
          ./ "$REMOTE:$DEPLOY_PATH"

    - name: Write .env on server
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
        POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
        SCHEDULE_GROUP: ${{ secrets.SCHEDULE_GROUP }}
        PARSER_SOURCE_URL: ${{ secrets.PARSER_SOURCE_URL }}
      run: |
        printf 'BOT_TOKEN=%s\n\nPOSTGRES_DB=%s\nPOSTGRES_USER=%s\nPOSTGRES_PASSWORD=%s\nPOSTGRES_HOST=%s\nPOSTGRES_PORT=%s\n\nSCHEDULE_GROUP=%s\nPARSER_SOURCE_URL=%s\n' \
          "$BOT_TOKEN" \
          "$POSTGRES_DB" "$POSTGRES_USER" "$POSTGRES_PASSWORD" "$POSTGRES_HOST" "$POSTGRES_PORT" \
          "$SCHEDULE_GROUP" "$PARSER_SOURCE_URL" \
          | ssh $SSH_OPTS "$REMOTE" "cat > $DEPLOY_PATH/.env"

    - name: Build and restart container
      run: |
        ssh $SSH_OPTS "$REMOTE" \
          "cd $DEPLOY_PATH && docker compose -f docker-compose.prod.yml up -d --build --remove-orphans"
