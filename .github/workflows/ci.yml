name: CI

on:
  pull_request:
    branches: [ master, dev ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install -e ".[dev]"

    - name: Ruff lint & format
      run: ruff check . && ruff format --check .

    - name: Mypy
      run: mypy .
